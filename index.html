<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNotes AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #fafafa; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: #fff; padding: 60px 20px 20px; border-bottom: 1px solid #eee; }
    .header h1 { font-size: 28px; font-weight: 700; }
    .header p { color: #888; font-size: 14px; margin-top: 4px; }
    .search { background: #fff; padding: 16px 20px; border-bottom: 1px solid #eee; }
    .search input { width: 100%; padding: 12px 16px; background: #f5f5f5; border: none; border-radius: 12px; font-size: 16px; }
    .folders { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; background: #fff; border-bottom: 1px solid #eee; }
    .folder { padding: 8px 16px; background: #f0f0f0; border-radius: 20px; font-size: 13px; cursor: pointer; border: none; }
    .folder.active { background: #1a1a1a; color: #fff; }
    .notes { flex: 1; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; align-content: start; }
    .note { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
    .note:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .note-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .note-duration { font-size: 12px; color: #888; font-weight: 600; }
    .note-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .note-summary { font-size: 14px; color: #666; line-height: 22px; }
    .note-footer { display: flex; justify-content: space-between; margin-top: 16px; }
    .note-date { font-size: 12px; color: #aaa; }
    .note-folder { font-size: 11px; background: #f0f0f0; padding: 4px 10px; border-radius: 10px; }
    .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #1a1a1a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: flex-end; z-index: 100; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; width: 100%; max-width: 500px; margin: auto auto 0; border-radius: 24px 24px 0 0; padding: 32px; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .modal-close { font-size: 24px; background: none; border: none; cursor: pointer; }
    .title-input { width: 100%; padding: 16px; background: #f5f5f5; border-radius: 12px; border: none; font-size: 16px; margin-bottom: 24px; }
    .record-area { text-align: center; padding: 20px; }
    .record-btn { width: 100px; height: 100px; border-radius: 50%; background: #f0f0f0; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .record-btn:active, .record-btn.active { background: #ff4444; }
    .record-btn-inner { width: 80px; height: 80px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .record-btn:active .record-btn-inner, .record-btn.active .record-btn-inner { background: #fff; }
    .record-hint { color: #888; font-size: 14px; }
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Voice Notes</h1>
      <p id="count">4 notes</p>
    </div>
    <div class="search">
      <input type="text" id="search" placeholder="Search notes...">
    </div>
    <div class="folders">
      <button class="folder active" data-folder="All">All</button>
      <button class="folder" data-folder="Work">Work</button>
      <button class="folder" data-folder="Personal">Personal</button>
      <button class="folder" data-folder="Ideas">Ideas</button>
    </div>
    <div class="notes" id="notes"></div>
    <button class="fab" onclick="openModal()">+</button>
  </div>
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">NEW RECORDING</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <input type="text" class="title-input" id="noteTitle" placeholder="Note title (optional)">
      <div class="record-area">
        <div class="record-btn" id="recordBtn" onmousedown="start()" onmouseup="stop()">
          <div class="record-btn-inner" id="icon">🎤</div>
        </div>
        <p class="record-hint" id="hint">Hold to record</p>
      </div>
    </div>
  </div>
  <script>
    var notes = [
      {id:1, title:'Project Meeting', duration:'0:45', summary:'Key points: Q1 deadlines discussed. Action items assigned.', folder:'Work', date:'Today', pinned:true},
      {id:2, title:'App Ideas', duration:'1:20', summary:'Brainstorming new features and user engagement strategies.', folder:'Ideas', date:'Yesterday', pinned:false},
      {id:3, title:'Book Notes', duration:'2:15', summary:'Notes from Atomic Habits - habit formation insights.', folder:'Personal', date:'2 days ago', pinned:true},
      {id:4, title:'Client Call', duration:'0:30', summary:'Project requirements discussed. Timeline agreed.', folder:'Work', date:'3 days ago', pinned:false},
    ];
    var folder = 'All';
    var recording = false;
    var time = 0;
    var timer = null;

    function render() {
      var q = document.getElementById('search').value.toLowerCase();
      var n = notes.filter(function(x) {
        return (folder === 'All' || x.folder === folder) && (x.title.toLowerCase().indexOf(q) > -1 || x.summary.toLowerCase().indexOf(q) > -1);
      });
      var p = n.filter(function(x) { return x.pinned; });
      var r = n.filter(function(x) { return !x.pinned; });
      document.getElementById('count').textContent = notes.length + ' notes';
      
      if (n.length === 0) {
        document.getElementById('notes').innerHTML = '<div class="empty"><div class="empty-text">No notes yet</div><div class="empty-sub">Tap + to record</div></div>';
        return;
      }
      
      var html = '';
      var all = p.concat(r);
      for (var i = 0; i < all.length; i++) {
        var x = all[i];
        html += '<div class="note"><div class="note-header"><span class="note-duration">' + x.duration + '</span><span>' + (x.pinned ? '📌' : '') + '</span></div><div class="note-title">' + x.title + '</div><div class="note-summary">' + x.summary + '</div><div class="note-footer"><span class="note-date">' + x.date + '</span><span class="note-folder">' + x.folder + '</span></div></div>';
      }
      document.getElementById('notes').innerHTML = html;
    }

    var btns = document.querySelectorAll('.folder');
    for (var i = 0; i < btns.length; i++) {
      btns[i].onclick = function() {
        for (var j = 0; j < btns.length; j++) { btns[j].classList.remove('active'); }
        this.classList.add('active');
        folder = this.getAttribute('data-folder');
        render();
      };
    }

    document.getElementById('search').oninput = render;

    function openModal() { document.getElementById('modal').classList.add('active'); }
    function closeModal() { document.getElementById('modal').classList.remove('active'); if (recording) stop(); }

    function start() { 
      if (recording) return; 
      recording = true; 
      time = 0; 
      document.getElementById('recordBtn').classList.add('active'); 
      document.getElementById('icon').textContent = '⏹'; 
      document.getElementById('hint').textContent = 'Recording...';
      timer = setInterval(function() { 
        time++; 
        var m = Math.floor(time / 60);
        var s = time % 60;
        document.getElementById('hint').textContent = 'Recording ' + m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);
    }

    function stop() { 
      if (!recording) return; 
      recording = false; 
      clearInterval(timer); 
      document.getElementById('recordBtn').classList.remove('active'); 
      document.getElementById('icon').textContent = '🎤';
      
      if (time > 3) {
        var t = document.getElementById('noteTitle').value || 'Voice Note ' + (notes.length + 1);
        var s = ['Key points: Important discussion with action items identified.', 'Main topics: Planning and strategy discussed.', 'Summary: Productive session with next steps defined.', 'Notes: Valuable insights gathered.'];
        var newNote = {
          id: Date.now(),
          title: t,
          summary: s[Math.floor(Math.random() * s.length)],
          duration: Math.floor(time / 60) + ':' + (time % 60 < 10 ? '0' : '') + (time % 60),
          folder: folder === 'All' ? 'Personal' : folder,
          date: 'Just now',
          pinned: false
        };
        notes.unshift(newNote);
        document.getElementById('noteTitle').value = '';
        closeModal();
        render();
      }
      document.getElementById('hint').textContent = 'Hold to record';
    }

    render();
  </script>
</body>
</html>
