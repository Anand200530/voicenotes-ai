<!DOCTYPE html><html><head><meta charset="UTF-8"><title>VoiceNotes</title><style>body{font-family:sans-serif;background:#fafafa}.header{background:#fff;padding:60px 20px 20px;border-bottom:1px solid #eee}.header h1{font-size:28px;font-weight:700}.header p{color:#888;font-size:14px}.search{padding:16px 20px;background:#fff;border-bottom:1px solid #eee}input{width:100%;padding:12px 16px;background:#f5f5f5;border:none;border-radius:12px;font-size:16px}.folders{display:flex;gap:8px;padding:12px 20px;background:#fff;overflow-x:auto}.folder{padding:8px 16px;background:#f0f0f0;border-radius:20px;font-size:13px;cursor:pointer;border:none}.folder.active{background:#1a1a1a;color:#fff}.notes{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:16px}.note{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}.note-header{display:flex;justify-content:space-between;margin-bottom:12px}.note-duration{font-size:12px;color:#888}.note-title{font-size:16px;font-weight:600;margin-bottom:8px}.note-summary{font-size:14px;color:#666;line-height:22px}.note-footer{display:flex;justify-content:space-between;margin-top:16px}.note-date{font-size:12px;color:#aaa}.note-folder{font-size:11px;background:#f0f0f0;padding:4px 10px;border-radius:10px}.fab{position:fixed;bottom:30px;right:30px;width:60px;height:60px;background:#1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;cursor:pointer}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:flex-end}.modal.active{display:flex}.modal-content{background:#fff;width:100%;max-width:500px;margin:auto auto 0;border-radius:24px 24px 0 0;padding:32px}.modal-header{display:flex;justify-content:space-between;margin-bottom:20px}.modal-title{font-size:14px;font-weight:700}.title-input{width:100%;padding:16px;background:#f5f5f5;border-radius:12px;border:none;font-size:16px;margin-bottom:24px}.record-area{text-align:center;padding:20px}.record-btn{width:100px;height:100px;border-radius:50%;background:#f0f0f0;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;cursor:pointer}.record-btn-inner{width:80px;height:80px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:32px}.record-hint{color:#888;font-size:14px}</style></head><body><div class="header"><h1>Voice Notes</h1><p id="count">4 notes</p></div><div class="search"><input type="text" id="search" placeholder="Search notes..." oninput="render()"></div><div class="folders"><button class="folder active" onclick="setFolder(0)">All</button><button class="folder" onclick="setFolder(1)">Work</button><button class="folder" onclick="setFolder(2)">Personal</button><button class="folder" onclick="setFolder(3)">Ideas</button></div><div class="notes" id="notes"></div><button class="fab" onclick="showModal()">+</button><div class="modal" id="modal"><div class="modal-content"><div class="modal-header"><span class="modal-title">NEW RECORDING</span><button onclick="hideModal()" style="font-size:24px;background:none;border:none;cursor:pointer">x</button></div><input type="text" class="title-input" id="noteTitle" placeholder="Note title (optional)"><div class="record-area"><div class="record-btn" onmousedown="startRec()" onmouseup="stopRec()"><div class="record-btn-inner" id="icon">O</div></div><p class="record-hint" id="hint">Hold to record</p></div></div></div><script>var notes=[{id:1,title:"Project Meeting",duration:"0:45",summary:"Key points discussed.",folder:"Work",date:"Today",pinned:true},{id:2,title:"App Ideas",duration:"1:20",summary:"New features.",folder:"Ideas",date:"Yesterday",pinned:false},{id:3,title:"Book Notes",duration:"2:15",summary:"Book insights.",folder:"Personal",date:"2 days ago",pinned:true},{id:4,title:"Client Call",duration:"0:30",summary:"Requirements.",folder:"Work",date:"3 days ago",pinned:false}];var folder=0;var recording=false;var time=0;var timer=null;function render(){var q=document.getElementById("search").value.toLowerCase();var f=[];for(var i=0;i<notes.length;i++){var n=notes[i];var matchFolder=folder===0||n.folder===["All","Work","Personal","Ideas"][folder];var matchQuery=q===""||n.title.toLowerCase().indexOf(q)>-1||n.summary.toLowerCase().indexOf(q)>-1;if(matchFolder&&matchQuery)f.push(n)}var pinned=[];var regular=[];for(var i=0;i<f.length;i++){if(f[i].pinned)pinned.push(f[i]);else regular.push(f[i])}var display=pinned.concat(regular);document.getElementById("count").textContent=notes.length+" notes";if(display.length===0){document.getElementById("notes").innerHTML="<div style=text-align:center;padding:60px><div>No notes</div><div style=color:#888;font-size:14px>Tap + to record</div></div>";return}var html="";for(var i=0;i<display.length;i++){var n=display[i];html=html+"<div class=note><div class=note-header><span class=note-duration>"+n.duration+"</span><span>"+(n.pinned?"P":"")+"</span></div><div class=note-title>"+n.title+"</div><div class=note-summary>"+n.summary+"</div><div class=note-footer><span class=note-date>"+n.date+"</span><span class=note-folder>"+n.folder+"</span></div></div>"}document.getElementById("notes").innerHTML=html}function setFolder(f){folder=f;var btns=document.querySelectorAll(".folder");for(var i=0;i<btns.length;i++){btns[i].classList.remove("active")}btns[f].classList.add("active");render()}function showModal(){document.getElementById("modal").classList.add("active")}function hideModal(){document.getElementById("modal").classList.remove("active");if(recording)stopRec()}function startRec(){if(recording)return;recording=true;time=0;document.getElementById("icon").textContent="STOP";timer=setInterval(function(){time++;document.getElementById("hint").textContent="Recording "+Math.floor(time/60)+":"+(time%60)},1000)}function stopRec(){if(!recording)return;recording=false;clearInterval(timer);document.getElementById("icon").textContent="O";if(time>3){var title=document.getElementById("noteTitle").value||"Voice Note "+(notes.length+1);var summary=["Key points discussed.","Main topics covered.","Summary ready."][Math.floor(Math.random()*3)];notes.unshift({id:Date.now(),title:title,summary:summary,duration:Math.floor(time/60)+":"+(time%60),folder:["Work","Personal","Ideas"][folder],date:"Just now",pinned:false});document.getElementById("noteTitle").value="";hideModal();render()}time=0;document.getElementById("hint").textContent="Hold to record"}render()</script></body></html>
